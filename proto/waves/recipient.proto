syntax = "proto3";
package waves;
option java_package = "io.decentralchain.protobuf.transaction";
option csharp_namespace = "DecentralChain";
option go_package = "github.com/Decentral-America/protobuf-serialization/pkg/grpc/generated/waves";

message Recipient {
    oneof recipient {
        // First 20 bytes of the result of the Keccak256(Blake2b256(publicKey)) hashing function.
        bytes public_key_hash = 1;
        string alias = 2;
    };
};

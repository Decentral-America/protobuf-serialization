syntax = "proto3";
package waves;
option java_package = "io.decentralchain.protobuf.snapshot";
option csharp_namespace = "DecentralChain";
option go_package = "github.com/Decentral-America/protobuf-serialization/pkg/grpc/generated/waves";

import "waves/transaction_state_snapshot.proto";

message BlockSnapshot {
  bytes block_id = 1;
  repeated TransactionStateSnapshot snapshots = 2;
}

message MicroBlockSnapshot {
  bytes total_block_id = 1;
  repeated TransactionStateSnapshot snapshots = 2;
}

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - Decentral-America
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - java
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
    commit-message:
      prefix: "ci:"
